# Déploiement Render — un seul service web (API + frontend SnapFiche)
services:
  - type: web
    name: snapfiche
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/server.js
    envVars:
      - key: SUPABASE_URL
        sync: false        # à renseigner dans le dashboard Render
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: KIE_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://snapfiche.com
